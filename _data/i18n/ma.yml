  community_rules_title: "قوانين المجتمع"
  rule_1_title: "كن محترما"
  rule_1_text: "تعامل مع الجميع باحترام. ممنوع الإساءة أو خطاب الكراهية."
  rule_2_title: "ممنوع السبام"
  rule_2_text: "لا تكرر الرسائل ولا الإعلانات بشكل مزعج."
  rule_3_title: "حافظ على النظافة"
  rule_3_text: "ممنوع المحتوى غير المناسب أو الروابط الخبيثة."
  rule_4_title: "استعمل العقل"
  rule_4_text: "التزم بقوانين Discord وكن عضواً إيجابياً داخل المجتمع."
