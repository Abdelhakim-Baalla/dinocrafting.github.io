  about_story_title: "From Player to Creator"
  about_story_p1: "Bonjour! I'm Dino Crafting, a Moroccan Minecraft content creator passionate about modding and community building. What started as a hobby playing Minecraft quickly turned into a mission to bring high-quality Minecraft content to Arabic-speaking players, especially my fellow Moroccans."
  about_story_p2: "I believe gaming should be accessible to everyone, regardless of language. That's why I create content in Darija, English, and French to reach as many players as possible."
  about_story_p3: "When I'm not coding mods or recording videos, you'll find me on the Discord server chatting with the community and planning our next big project."
