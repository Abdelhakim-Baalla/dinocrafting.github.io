  about_story_title: "من لاعب إلى صانع محتوى"
  about_story_p1: "أنا Dino Crafting، صانع محتوى مغربي متخصص في ماينكرافت، وشغفي هو تطوير المودات وبناء مجتمع قوي."
  about_story_p2: "أؤمن أن اللعب يجب أن يكون متاحاً للجميع، لذلك أقدّم محتوى واضحاً ومفيداً يصل إلى أكبر عدد من اللاعبين."
  about_story_p3: "وعندما لا أعمل على المودات أو الفيديوهات، ستجدني في Discord أتواصل مع المجتمع ونخطط للمشاريع القادمة."
  about_milestones_title: "محطات القناة"
