  about_philosophy_title: "فلسفة تطوير المودات"
  about_philosophy_text: "كل مود نطوره يهدف إلى حل مشاكل حقيقية داخل اللعبة، مع أولوية للاستقرار والتوافق وتجربة المستخدم."
  about_connect_title: "تواصل معي"
  about_connect_subtitle: "تابع Dino Crafting على المنصات الاجتماعية للحصول على التحديثات اليومية والمحتوى الحصري."
  community_discord_title: "سيرفر الديسكورد"
  community_discord_text: "Discord الخاص بنا هو المكان المناسب للنقاش، المشاركة في الألعاب، والحصول على المساعدة حول المودات."
  community_discord_button: "انضم للديسكورد الآن"
