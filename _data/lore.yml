title: "قصة Dino Crafting"
subtitle: "من فكرة بسيطة إلى مجتمع كامل"
hero_quote: "ماينكرافت ليست لعبة فقط، إنها لغة عالمية."

chapters:
  - id: beginning
    icon: "🌱"
    color: "moroccangreen"
    title: "البداية"
    year: "2023"
    paragraphs:
      - "بدأت قصة Dino Crafting من حلم بسيط: تقديم محتوى ماينكرافت بالعربية بطريقة احترافية وممتعة."
      - "في عالم يهيمن عليه المحتوى الإنجليزي، رأيت فجوة كبيرة في المحتوى العربي عالي الجودة."
      - "كانت الفكرة: لما لا أكون أنا الجسر؟"

  - id: why_minecraft
    icon: "💎"
    color: "blue-500"
    title: "لماذا Minecraft؟"
    year: "اختياري"
    paragraphs:
      - "ماينكرافت هي اللعبة الأكثر تأثيرًا في جيلي. علمتني الإبداع، الصبر، والتعاون."
      - "في Minecraft تستطيع بناء أي شيء، اكتشاف عوالم لا نهائية، وتجربة قصص فريدة."
      - "الأهم: Minecraft تجمع كل الأعمار والثقافات حول لعبة واحدة."

  - id: why_dinocrafting
    icon: "🦖"
    color: "yellow-500"
    title: "لماذا Dino Crafting؟"
    year: "تسمية"
    paragraphs:
      - "Dinocrafting يجمع بين كلمتين: Dino (الديناصور رمز القوة والصمود) و Crafting (الإبداع والصناعة)."
      - "الاسم يعكس فلسفة القناة: مزج بين الإبداع وقوة الإرادة."
      - "وأيضًا… Dinosaurs cool 😄"

  - id: first_video
    icon: "🎬"
    color: "red-600"
    title: "أول فيديو"
    year: "يونيو 2023"
    paragraphs:
      - "كان أول فيديو متواضعًا جدًا. لا كاميرا احترافية، لا برامج مونتاج فاخرة."
      - "لكن كان فيه شغف. وهذا أهم من كل المعدات."
      - "100 مشاهدة في الأسبوع الأول. كل واحدة كانت تعني الكثير."

  - id: first_milestone
    icon: "💯"
    color: "purple-500"
    title: "أول 100 مشترك"
    year: "سبتمبر 2023"
    paragraphs:
      - "100 مشترك = 100 شخص اختاروا الانضمام لرحلتي."
      - "شعرت لأول مرة أن هناك مجتمعًا يتشكل."
      - "كل فيديو بعدها أصبح أفضل من سابقه."

  - id: thousand_subs
    icon: "🎉"
    color: "moroccangreen"
    title: "أول 1000 مشترك"
    year: "مارس 2024"
    paragraphs:
      - "بعد 9 أشهر من العمل المتواصل، وصلنا إلى 1000 مشترك."
      - "هذه نقطة تحول كبيرة. بدأت أتخذ Dino Crafting بجدية أكبر."
      - "اشتريت معدات أفضل، وطورت أسلوبي في التصوير والمونتاج."

  - id: discord_launch
    icon: "💬"
    color: "indigo-500"
    title: "إطلاق Discord"
    year: "يونيو 2024"
    paragraphs:
      - "افتتاح خادم Discord كان قرارًا مهمًا."
      - "أردت مكانًا حيث يلتقي المجتمع، يتعاون، ويصنع ذكريات."
      - "اليوم، Discord هو قلب المجتمع النابض."

  - id: flowinventory_journey
    icon: "⚙️"
    color: "yellow-500"
    title: "حلم FlowInventory"
    year: "أبريل 2025"
    paragraphs:
      - "كنت دائمًا أحلم بصنع مود خاص بي."
      - "FlowInventory ولد من إحباطي اليومي مع تنظيم المخزون في Minecraft."
      - "قلت لنفسي: 'لماذا لا أصنع الحل بنفسي؟'"

  - id: flowinventory_release
    icon: "🚀"
    color: "moroccangreen"
    title: "إطلاق FlowInventory v1.0"
    year: "نوفمبر 2025"
    paragraphs:
      - "بعد 7 أشهر من البرمجة والتعب والاختبار، أُطلق FlowInventory رسميًا."
      - "تم نشره على CurseForge وModrinth، ووصلت ردود الفعل من حول العالم."
      - "كان أكبر إنجاز شخصي بالنسبة لي."

  - id: today
    icon: "🌟"
    color: "red-600"
    title: "اليوم"
    year: "2026"
    paragraphs:
      - "6,600+ مشترك على يوتيوب. مجتمع نشط على Discord. مود يستعمله الآلاف."
      - "لكن هذا ليس النهاية. هذه فقط البداية."
      - "كل يوم أتعلم شيئًا جديدًا، وأطور القناة والمحتوى."

  - id: future
    icon: "🚀"
    color: "purple-500"
    title: "الرؤية للمستقبل"
    year: "قادم"
    paragraphs:
      - "10,000 مشترك هو الهدف القادم."
      - "أريد إطلاق مودات جديدة، تنظيم events، وبناء مجتمع أقوى."
      - "في النهاية، Dino Crafting ليس مجرد قناة - إنه عائلة."

values:
  - icon: "🎯"
    title: "الجودة قبل الكمية"
    text: "كل فيديو يأخذ وقته. لا أنشر شيئًا حتى أكون فخورًا به."
  - icon: "❤️"
    title: "المجتمع أولاً"
    text: "كل قرار أتخذه يبدأ من سؤال: ماذا يحتاج المجتمع؟"
  - icon: "🌍"
    title: "محتوى عربي احترافي"
    text: "نستحق محتوى بنفس جودة المحتوى العالمي. وأكثر."
  - icon: "🛠️"
    title: "بناء مستمر"
    text: "كل يوم أبني شيئًا جديدًا - فيديو، مود، أو مجتمع."

closing:
  title: "شكرًا لكونك جزءًا من القصة"
  text: "بدون دعمكم، Dino Crafting لن يكون موجودًا. هذه القصة قصتنا جميعًا."
