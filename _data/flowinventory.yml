faq:
  - q: "كيف أثبت FlowInventory؟"
    a: "حمل الملف من CurseForge أو Modrinth وضعه في مجلد mods، ثم شغل اللعبة مع Forge أو Fabric."
  - q: "هل المود مجاني؟"
    a: "نعم، 100% مجاني ومفتوح المصدر برخصة MIT."
  - q: "هل يعمل على Minecraft الأصلي فقط؟"
    a: "نعم، يحتاج Minecraft Java Edition مع Forge أو Fabric."
  - q: "كيف أبلغ عن مشكلة؟"
    a: "افتح Issue في GitHub أو راسلني عبر Discord."
