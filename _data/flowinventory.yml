slug: flowinventory
title: FlowInventory
tagline: "نظام ذكي لإدارة المخزون في ماينكرافت"
description: "FlowInventory هو مود ماينكرافت مفتوح المصدر يقوم بترتيب المخزون تلقائيًا، تبديل الأدوات بذكاء، وضبط الـ Hotbar بحسب أسلوب لعبك."
hero_image: https://media.forgecdn.net/avatars/591/10/637841050000000000.png
hero_video: ""
status: stable
license: MIT

links:
  curseforge: "https://www.curseforge.com/minecraft/mc-mods/flowinventory"
  modrinth: "https://modrinth.com/mod/flowinventory"
  github: "https://github.com/Abdelhakim-Baalla/flowinventory"
  issues: "https://github.com/Abdelhakim-Baalla/flowinventory/issues"
  wiki: "https://github.com/Abdelhakim-Baalla/flowinventory#readme"

features:
  - icon: "✨"
    title: "ترتيب تلقائي للمخزون"
    text: "خوارزمية ذكية تنظم العناصر في الصناديق والمخزون بنقرة واحدة."
  - icon: "🎯"
    title: "Hotbar ذكي"
    text: "يتعلم نمط لعبك ويضع الأدوات الصحيحة في المكان المناسب."
  - icon: "⚡"
    title: "تبديل تلقائي للأدوات"
    text: "يستبدل الفأس بالمعول أو السيف تلقائيًا حسب البلوك أو العدو."
  - icon: "🔄"
    title: "Auto-Refill"
    text: "يعيد ملء العنصر المستهلك من المخزون مباشرة."
  - icon: "🛠️"
    title: "إعدادات قابلة للتخصيص"
    text: "تحكم كامل في كل الميزات من ملف الإعدادات."
  - icon: "🌍"
    title: "متعدد الإصدارات"
    text: "يدعم Forge وFabric لعدة إصدارات من Minecraft."

compatibility:
  - version: "1.21.x"
    forge: true
    fabric: true
    quilt: true
    notes: "آخر إصدار مستقر"
  - version: "1.20.x"
    forge: true
    fabric: true
    quilt: true
    notes: "مدعوم بالكامل"
  - version: "1.19.x"
    forge: true
    fabric: true
    quilt: false
    notes: "إصلاحات أمنية فقط"
  - version: "1.18.x"
    forge: true
    fabric: false
    quilt: false
    notes: "Legacy build"

