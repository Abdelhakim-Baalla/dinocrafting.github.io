title: Dinocrafting
email: contact@dinocrafting.com
description: >-
  The official hub for Dinocrafting - Moroccan Minecraft YouTuber.
baseurl: "" # the subpath of your site, e.g. /blog
url: "https://dinocrafting.github.io" # the base hostname & protocol for your site, e.g. http://example.com

# Languages
default_lang: ma
languages:
  - ma
  - en
  - fr
  - ar
  - es

# Monetization Configuration
monetization:
  provider: "adsterra" # Options: monetag, adsterra, none
  adsterra:
    social_bar: "" # Paste Social Bar script here
    top_banner: "" # Paste 728x90 Banner script here
    anchor_banner: "" # Paste Native/Anchor script here
    in_content: "" # Paste Native banner here
  monetag:
    multitag_script: '<script src="https://quge5.com/88/tag.min.js" data-zone="234755" async data-cfasync="false"></script>'

markdown: kramdown
theme: minima
plugins:
  - jekyll-feed
  - jekyll-seo-tag
