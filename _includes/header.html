<header class="sticky top-0 z-50 bg-white/80 dark:bg-darkbg/80 backdrop-blur-md border-b border-gray-200 dark:border-gray-800"
        x-data="{ 
          level: localStorage.getItem('dinoLevel') || 1,
          exp: localStorage.getItem('dinoExp') || 0,
          coins: localStorage.getItem('dinoCoins') || 0,
          visits: localStorage.getItem('dinoVisits') || 0,
          neededExp: 100,
          init() {
            // Gain 10 EXP and 5 Coins every time they visit a page
            this.exp = parseInt(this.exp) + 10;
            this.coins = parseInt(this.coins) + 5;
            this.visits = parseInt(this.visits) + 1;
            
            if (this.exp >= this.neededExp) {
              this.level++;
              this.exp = 0;
            }
            localStorage.setItem('dinoLevel', this.level);
            localStorage.setItem('dinoExp', this.exp);
            localStorage.setItem('dinoCoins', this.coins);
            localStorage.setItem('dinoVisits', this.visits);
          }
        }">
  <div class="container mx-auto px-4 h-16 flex items-center justify-between">
    <!-- Logo & Level -->
    <a href="/{{ lang }}/" class="flex items-center gap-3 group">
      <div class="w-10 h-10 flex-shrink-0 rounded-xl overflow-hidden border-2 border-moroccangreen/20 group-hover:border-moroccangreen transition-all relative">
        <img src="{{ site.logo | relative_url }}" class="w-full h-full object-cover">
        <!-- Ramadan Moon -->
        <div class="absolute inset-0 flex items-center justify-center bg-black/60 opacity-0 transition-opacity pointer-events-none" :class="{ 'opacity-100': document.body.classList.contains('theme-ramadan') }">
          <span class="text-xs">🌙</span>
        </div>
      </div>
      <div class="flex flex-col">
        <div class="flex items-center gap-2">
          <span class="text-sm font-black text-white leading-none uppercase">Dino Crafting</span>
          <div class="flex items-center gap-1">
            <span class="px-1.5 py-0.5 bg-moroccangreen text-white text-[8px] font-black rounded-md" x-text="'LVL ' + level"></span>
            <span class="px-1.5 py-0.5 bg-yellow-500 text-black text-[8px] font-black rounded-md" x-text="coins + ' 🪙'"></span>
          </div>
        </div>
        <!-- Progress Bar -->
        <div class="w-24 h-1 bg-white/5 rounded-full mt-1 overflow-hidden">
          <div class="h-full bg-moroccangreen transition-all duration-1000" :style="'width: ' + (exp/neededExp * 100) + '%'"></div>
        </div>
      </div>
    </a>

    <!-- Navigation -->
    <div class="flex items-center gap-8">
      <!-- Dino Rank (Gamification) -->
      <div class="hidden lg:flex items-center gap-4 px-6 py-2 bg-white/5 border border-white/10 rounded-full" 
           x-data="{ 
             exp: parseInt(localStorage.getItem('dinoExp') || 0),
             level: parseInt(localStorage.getItem('dinoLevel') || 1),
             get progress() { return (this.exp % 100); }
           }"
           x-init="
             this.exp = parseInt(localStorage.getItem('dinoExp') || 0) + 5;
             this.level = Math.floor(this.exp / 100) + 1;
             localStorage.setItem('dinoExp', this.exp);
             localStorage.setItem('dinoLevel', this.level);
           ">
        <div class="flex flex-col items-end">
          <div class="flex items-center gap-2">
            <span class="text-[10px] font-black text-moroccangreen uppercase tracking-widest" x-text="'LVL ' + level"></span>
            <span class="text-[10px] font-black text-yellow-500 tracking-widest" x-text="(localStorage.getItem('dinoCoins') || 0) + ' 🪙'"></span>
          </div>
          <div class="w-24 h-1.5 bg-white/10 rounded-full mt-1 overflow-hidden">
            <div class="h-full bg-moroccangreen shadow-[0_0_15px_rgba(0,98,51,1)] transition-all duration-1000" :style="'width: ' + progress + '%'"></div>
          </div>
        </div>
        <div class="w-8 h-8 rounded-lg bg-moroccangreen/20 flex items-center justify-center text-moroccangreen animate-pulse">
          <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20"><path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z"/></svg>
        </div>
      </div>

      <nav class="hidden md:flex items-center gap-8">
        <a href="/{{ lang }}/projects/" class="text-xs font-black text-gray-400 hover:text-white uppercase tracking-widest transition-colors">Projects</a>
        <a href="/{{ lang }}/news/" class="text-xs font-black text-gray-400 hover:text-white uppercase tracking-widest transition-colors">News</a>
        <a href="/{{ lang }}/theories/" class="text-xs font-black text-gray-400 hover:text-white uppercase tracking-widest transition-colors">Theories</a>
      </nav>

      <!-- Language Switcher -->
      <div class="relative" x-data="{ open: false }">
        <button @click="open = !open" class="flex items-center gap-2 px-4 py-2 bg-white/5 border border-white/10 rounded-xl hover:bg-white/10 transition-all">
          <span class="text-xs font-black text-white uppercase tracking-widest">{{ lang }}</span>
          <svg class="w-4 h-4 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M19 9l-7 7-7-7" /></svg>
        </button>
        <div x-show="open" @click.away="open = false" class="absolute top-full right-0 mt-2 w-32 bg-black/90 backdrop-blur-xl border border-white/10 rounded-xl overflow-hidden shadow-2xl z-50">
          <a href="/ma/" class="block px-4 py-3 text-[10px] font-black text-gray-400 hover:text-white hover:bg-white/5 transition-all">🇲🇦 DARIJA</a>
          <a href="/en/" class="block px-4 py-3 text-[10px] font-black text-gray-400 hover:text-white hover:bg-white/5 transition-all">🇺🇸 ENGLISH</a>
          <a href="/fr/" class="block px-4 py-3 text-[10px] font-black text-gray-400 hover:text-white hover:bg-white/5 transition-all">🇫🇷 FRENCH</a>
        </div>
      </div>

      <button class="md:hidden text-white">
        <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" /></svg>
      </button>
    </div>
  </div>
</header>
