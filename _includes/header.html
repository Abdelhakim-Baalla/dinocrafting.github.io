<header class="sticky top-0 z-50 bg-white/80 dark:bg-darkbg/80 backdrop-blur-md border-b border-gray-200 dark:border-gray-800"
        x-data="{ 
          level: localStorage.getItem('dinoLevel') || 1,
          exp: localStorage.getItem('dinoExp') || 0,
          coins: localStorage.getItem('dinoCoins') || 0,
          visits: localStorage.getItem('dinoVisits') || 0,
          neededExp: 100,
          init() {
            // Gain 10 EXP and 5 Coins every time they visit a page
            this.exp = parseInt(this.exp) + 10;
            this.coins = parseInt(this.coins) + 5;
            this.visits = parseInt(this.visits) + 1;
            
            if (this.exp >= this.neededExp) {
              this.level++;
              this.exp = 0;
            }
            localStorage.setItem('dinoLevel', this.level);
            localStorage.setItem('dinoExp', this.exp);
            localStorage.setItem('dinoCoins', this.coins);
            localStorage.setItem('dinoVisits', this.visits);
          }
        }">
  <div class="container mx-auto px-4 h-16 flex items-center justify-between">
    <!-- Logo & Level -->
    <a href="/{{ lang }}/" class="flex items-center gap-3 group">
      <div class="w-10 h-10 flex-shrink-0 rounded-xl overflow-hidden border-2 border-moroccangreen/20 group-hover:border-moroccangreen transition-all relative">
        <img src="{{ site.logo | relative_url }}" class="w-full h-full object-cover">
        <!-- Ramadan Moon -->
        <div class="absolute inset-0 flex items-center justify-center bg-black/60 opacity-0 transition-opacity pointer-events-none" :class="{ 'opacity-100': document.body.classList.contains('theme-ramadan') }">
          <span class="text-xs">🌙</span>
        </div>
      </div>
      <div class="flex flex-col">
        <div class="flex items-center gap-2">
          <span class="text-sm font-black text-white leading-none uppercase">Dino Crafting</span>
          <div class="flex items-center gap-1">
            <span class="px-1.5 py-0.5 bg-moroccangreen text-white text-[8px] font-black rounded-md" x-text="'LVL ' + level"></span>
            <span class="px-1.5 py-0.5 bg-yellow-500 text-black text-[8px] font-black rounded-md" x-text="coins + ' 🪙'"></span>
          </div>
        </div>
        <!-- Progress Bar -->
        <div class="w-24 h-1 bg-white/5 rounded-full mt-1 overflow-hidden">
          <div class="h-full bg-moroccangreen transition-all duration-1000" :style="'width: ' + (exp/neededExp * 100) + '%'"></div>
        </div>
      </div>
    </a>

    <!-- Navigation -->
    <nav class="hidden lg:flex items-center gap-8" dir="rtl">
      <a href="/{{ lang }}/" class="text-sm font-black text-gray-500 hover:text-white transition-colors uppercase italic tracking-tighter">الرئيسية</a>
      <a href="/{{ lang }}/projects/" class="text-sm font-black text-gray-500 hover:text-white transition-colors uppercase italic tracking-tighter">المشاريع</a>
      <a href="/{{ lang }}/news/" class="text-sm font-black text-gray-500 hover:text-white transition-colors uppercase italic tracking-tighter">الأخبار</a>
      <a href="/{{ lang }}/tutorials/" class="text-sm font-black text-gray-500 hover:text-white transition-colors uppercase italic tracking-tighter">شروحات</a>
      <a href="/{{ lang }}/theories/" class="text-sm font-black text-gray-500 hover:text-white transition-colors uppercase italic tracking-tighter">نظريات</a>
      <a href="/{{ lang }}/socials/" class="text-sm font-black text-gray-500 hover:text-white transition-colors uppercase italic tracking-tighter">تواصل</a>
      <a href="/{{ lang }}/servers/" class="text-sm font-black text-gray-500 hover:text-white transition-colors uppercase italic tracking-tighter relative">
        سيرفرات
        <span class="absolute -top-1 -right-2 flex h-2 w-2">
          <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-moroccangreen opacity-75"></span>
          <span class="relative inline-flex rounded-full h-2 w-2 bg-moroccangreen"></span>
        </span>
      </a>
    </nav>

    <!-- Actions -->
    <div class="flex items-center gap-4">
      <!-- Darija Script Toggle (Only for MA) -->
      {% if lang == 'ma' %}
      <button @click="arabiziMode = !arabiziMode; localStorage.setItem('arabiziMode', arabiziMode)" 
              class="px-3 py-1 text-[10px] font-bold rounded-full border border-moroccangreen text-moroccangreen hover:bg-moroccangreen hover:text-white transition-all uppercase tracking-tighter"
              :class="arabiziMode ? 'bg-moroccangreen text-white' : ''">
        <span x-show="!arabiziMode">عربي</span>
        <span x-show="arabiziMode">Arabizi</span>
      </button>
      {% endif %}

      <!-- Dark Mode Toggle -->
      <button @click="darkMode = !darkMode; localStorage.setItem('darkMode', darkMode)" class="p-2 rounded-lg hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors">
        <template x-if="!darkMode">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" /></svg>
        </template>
        <template x-if="darkMode">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 9H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z" /></svg>
        </template>
      </button>

      <!-- Language Switcher -->
      <div class="relative" x-data="{ open: false }">
        <button @click="open = !open" class="flex items-center gap-1 p-2 rounded-lg hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors uppercase font-bold text-sm">
          {{ lang }}
          <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7" /></svg>
        </button>
        <div x-show="open" @click.away="open = false" class="absolute right-0 mt-2 w-32 bg-white dark:bg-darkcard border border-gray-200 dark:border-gray-800 rounded-lg shadow-xl overflow-hidden py-1">
          {% for l in site.languages %}
            <a href="{{ l | prepend: '/' | append: '/' | relative_url }}" class="block px-4 py-2 text-sm hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors uppercase {% if l == lang %}text-moroccangreen font-bold{% endif %}">
              {{ l }}
            </a>
          {% endfor %}
        </div>
      </div>
    </div>
  </div>
</header>
