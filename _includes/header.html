<header class="sticky top-0 z-50 bg-white/80 dark:bg-darkbg/80 backdrop-blur-md border-b border-gray-200 dark:border-gray-800"
        x-data="{ mobileMenu: false }">
  <div class="container mx-auto px-4 h-20 flex items-center justify-between">
    <!-- Logo -->
    <a href="/" class="flex items-center gap-3">
      <div class="w-12 h-12 rounded-2xl flex items-center justify-center text-white overflow-hidden border border-white/10">
        <img src="{{ site.logo }}" class="w-full h-full object-cover" alt="Dino Crafting Logo">
      </div>
      <div class="hidden sm:block">
        <h1 class="text-lg font-black text-white leading-none uppercase italic">DINO CRAFTING</h1>
        {% if site.youtube.channel_id %}
        <div class="flex items-center gap-2 mt-1">
          <span class="text-[10px] font-black text-red-500 uppercase tracking-widest">YouTube</span>
        </div>
        {% endif %}
      </div>
    </a>

    <!-- Desktop Nav -->
    <nav class="hidden lg:flex items-center gap-8">
      <a href="/" class="text-xs font-black text-gray-400 hover:text-white uppercase tracking-widest transition-colors">الرئيسية</a>
      <a href="/mods/" class="text-xs font-black text-gray-400 hover:text-white uppercase tracking-widest transition-colors">المودات</a>
      <a href="/news/" class="text-xs font-black text-gray-400 hover:text-white uppercase tracking-widest transition-colors">الأخبار</a>
      <a href="/about/" class="text-xs font-black text-gray-400 hover:text-white uppercase tracking-widest transition-colors">حول</a>
      <a href="/contact/" class="text-xs font-black text-gray-400 hover:text-white uppercase tracking-widest transition-colors">اتصل</a>
    </nav>

    <!-- Actions -->
    <div class="flex items-center gap-4">
      <!-- YouTube Subscriber Count (real value only, fallback 0) -->
      {% if site.youtube.channel_id %}
      <a href="{{ site.youtube.url }}?sub_confirmation=1" target="_blank" class="hidden md:flex items-center gap-2 px-4 py-2 bg-red-600/10 border border-red-600/20 rounded-xl text-red-500 font-black text-xs hover:bg-red-600/20 transition-all">
        <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 24 24"><path d="M23.498 6.186a3.016 3.016 0 0 0-2.122-2.136C19.505 3.545 12 3.545 12 3.545s-7.505 0-9.377.505A3.017 3.017 0 0 0 .502 6.186C0 8.07 0 12 0 12s0 3.93.502 5.814a3.016 3.016 0 0 0 2.122 2.136c1.871.505 9.376.505 9.376.505s7.505 0 9.377-.505a3.015 3.015 0 0 0 2.122-2.136C24 15.93 24 12 24 12s0-3.93-0.502-5.814zM9.545 15.568V8.432L15.818 12l-6.273 3.568z"/></svg>
        <span data-stat="youtube-subscribers">{{ site.youtube.subscribers | default: 0 }}</span>
      </a>
      {% endif %}

      <div class="px-4 py-2 bg-white/5 border border-white/10 rounded-xl uppercase font-black text-[10px] text-white">العربية</div>

      <!-- Hamburger Button -->
      <button @click="mobileMenu = !mobileMenu" class="lg:hidden text-white p-2">
        <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path x-show="!mobileMenu" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
          <path x-show="mobileMenu" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
        </svg>
      </button>
    </div>
  </div>

    <!-- Mobile Menu Drawer -->
    <div x-show="mobileMenu" x-transition class="lg:hidden fixed inset-0 z-40 bg-black/95 backdrop-blur-2xl flex flex-col items-center justify-center space-y-12">
      <nav class="flex flex-col items-center space-y-8">
        <a @click="mobileMenu = false" href="/" class="text-4xl font-black text-white uppercase italic">الرئيسية</a>
        <a @click="mobileMenu = false" href="/mods/" class="text-4xl font-black text-white uppercase italic">المودات</a>
        <a @click="mobileMenu = false" href="/news/" class="text-4xl font-black text-white uppercase italic">الأخبار</a>
        <a @click="mobileMenu = false" href="/about/" class="text-4xl font-black text-white uppercase italic">حول</a>
        <a @click="mobileMenu = false" href="/contact/" class="text-4xl font-black text-white uppercase italic">اتصل</a>
      </nav>
    </div>
</header>
