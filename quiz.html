---
layout: default
title: اختبار شخصية Minecraft | Dino Crafting
description: اكتشف شخصيتك في عالم Minecraft عبر 7 أسئلة. شارك النتيجة مع أصدقائك!
permalink: /quiz/
lang: ma
---

{% assign quiz = site.data.quiz %}

<div class="max-w-3xl mx-auto py-8" dir="rtl"
     x-data="{
       quiz: {{ quiz | jsonify | escape }},
       step: 0,
       traits: { builder: 0, adventurer: 0, redstoner: 0, survivor: 0, warrior: 0, explorer: 0 },
       result: null,
       chooseOption(opt) {
         opt.traits.forEach(t => this.traits[t] = (this.traits[t] || 0) + 1);
         this.step++;
         if (this.step >= this.quiz.questions.length) this.computeResult();
       },
       computeResult() {
         const sorted = Object.entries(this.traits).sort((a,b) => b[1]-a[1]);
         const top = sorted[0][0];
         this.result = this.quiz.results[top];
       },
       restart() {
         this.step = 0;
         this.traits = { builder: 0, adventurer: 0, redstoner: 0, survivor: 0, warrior: 0, explorer: 0 };
         this.result = null;
       },
       share() {
         const txt = `أنا ${this.result.title} في Minecraft! اكتشف شخصيتك على dinocrafting.github.io/quiz/`;
         if (navigator.share) navigator.share({ title: 'Minecraft Personality', text: txt, url: window.location.href });
         else navigator.clipboard.writeText(txt + ' ' + window.location.href);
       }
     }">

  <div x-show="!result">
    <section class="text-center mb-12">
      <div class="inline-flex items-center gap-2 px-3 py-1 rounded-full bg-yellow-500/20 text-yellow-300 text-[10px] font-black uppercase tracking-widest mb-6">
        🧩 Quiz
      </div>
      <h1 class="text-4xl lg:text-5xl font-black text-white mb-4 tracking-tighter" x-text="quiz.title"></h1>
      <p class="text-gray-400" x-text="quiz.description"></p>
    </section>

    <div class="mb-6">
      <div class="flex justify-between text-xs text-gray-500 mb-2">
        <span>السؤال <span x-text="step + 1"></span> من <span x-text="quiz.questions.length"></span></span>
        <span x-text="Math.round(((step) / quiz.questions.length) * 100) + '%'"></span>
      </div>
      <div class="h-2 bg-white/5 rounded-full overflow-hidden">
        <div class="h-full bg-moroccangreen transition-all" :style="`width: ${((step) / quiz.questions.length) * 100}%`"></div>
      </div>
    </div>

    <template x-if="step < quiz.questions.length">
      <div class="p-8 rounded-[2rem] bg-white/5 border border-white/10">
        <h2 class="text-2xl font-black text-white mb-8" x-text="quiz.questions[step].text"></h2>
        <div class="space-y-3">
          <template x-for="(opt, idx) in quiz.questions[step].options" :key="idx">
            <button @click="chooseOption(opt)" class="w-full p-5 rounded-2xl bg-white/5 border border-white/10 hover:bg-moroccangreen/10 hover:border-moroccangreen/30 transition-all text-right">
              <span class="text-white font-bold" x-text="opt.text"></span>
            </button>
          </template>
        </div>
      </div>
    </template>
  </div>

  <template x-if="result">
    <section class="text-center">
      <div :class="`inline-flex items-center justify-center w-32 h-32 rounded-full bg-${result.color}/20 text-7xl mb-8`" x-text="result.emoji"></div>
      <h1 class="text-5xl lg:text-6xl font-black text-white mb-4" x-text="result.title"></h1>
      <p class="text-xl text-gray-300 mb-8 max-w-2xl mx-auto" x-text="result.description"></p>

      <div class="p-6 rounded-2xl bg-white/5 border border-white/10 max-w-2xl mx-auto mb-8">
        <div class="text-xs text-moroccangreen uppercase tracking-widest mb-2 font-black">💡 توصياتي لك</div>
        <p class="text-gray-300" x-text="result.advice"></p>
      </div>

      <div class="flex flex-wrap justify-center gap-3">
        <button @click="share()" class="px-6 py-3 rounded-xl bg-moroccangreen text-white font-bold hover:brightness-110 transition-all">📤 شارك النتيجة</button>
        <button @click="restart()" class="px-6 py-3 rounded-xl bg-white/10 border border-white/20 text-white font-bold hover:bg-white/20 transition-all">🔄 أعد الاختبار</button>
        <a href="{{ site.discord.invite }}" target="_blank" class="px-6 py-3 rounded-xl bg-indigo-600 text-white font-bold hover:brightness-110 transition-all">انضم لـ Discord</a>
      </div>
    </section>
  </template>
</div>
